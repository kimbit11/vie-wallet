<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIE Wallet</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
}
.balance{
  font-size:40px;
}

/* ACTION */
.actions{
  display:flex;
  justify-content:space-around;
  margin:15px;
}
.action{
  background:#111;
  padding:12px;
  border-radius:12px;
  width:70px;
  text-align:center;
  cursor:pointer;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:space-around;
  border-top:1px solid #111;
  border-bottom:1px solid #111;
}
.tab{
  padding:10px;
  cursor:pointer;
}
.active{
  color:#22c55e;
}

/* CARD */
.card{
  background:#111;
  margin:10px;
  padding:10px;
  border-radius:12px;
}
.row{
  display:flex;
  justify-content:space-between;
}

.green{color:#22c55e;}
.red{color:#ef4444;}

.btn{
  padding:8px;
  border:none;
  border-radius:8px;
  margin-top:5px;
  cursor:pointer;
}
.buy{background:#22c55e;}
.sell{background:#ef4444;}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:10px;
  border-top:1px solid #111;
}

iframe{
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="balance" id="balance">$0.00</div>
</div>

<div class="actions">
  <div class="action" onclick="connectWallet()">ETH</div>
  <div class="action" onclick="connectAptos()">APT</div>
  <div class="action" onclick="buy()">Buy</div>
  <div class="action" onclick="sell()">Sell</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('wallet')">Wallet</div>
  <div class="tab" onclick="showTab('market')">Market</div>
  <div class="tab" onclick="showTab('trade')">Trade</div>
  <div class="tab" onclick="showTab('nft')">NFT</div>
</div>

<!-- WALLET -->
<div id="wallet">
  <div id="tokens"></div>
</div>

<!-- MARKET -->
<div id="market" style="display:none">
  <div id="coins"></div>
</div>

<!-- TRADE -->
<div id="trade" style="display:none">
  <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=15"
  width="100%" height="300"></iframe>

  <div style="display:flex;gap:10px;padding:10px;">
    <button class="btn buy">BUY</button>
    <button class="btn sell">SELL</button>
  </div>
</div>

<!-- NFT -->
<div id="nft" style="display:none">

  <div class="card">
    <h4>Create NFT</h4>
    <input type="file" id="file">
    <button onclick="createNFT()">Upload</button>
  </div>

  <div id="nftList"></div>

</div>

<!-- NAV -->
<div class="nav">
  <div onclick="showTab('wallet')">Wallet</div>
  <div onclick="showTab('market')">Market</div>
  <div onclick="showTab('trade')">Trade</div>
  <div onclick="showTab('nft')">NFT</div>
</div>

<script>

// ===== CONNECT ETH =====
async function connectWallet(){
  if(window.ethereum){
    let provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts",[]);
    let signer = provider.getSigner();
    let address = await signer.getAddress();
    alert("ETH: " + address);
  }
}

// ===== CONNECT APTOS =====
async function connectAptos(){
  if(window.aptos){
    let res = await window.aptos.connect();
    alert("APT: " + res.address);
  }else{
    alert("Install Petra Wallet");
  }
}

// ===== PRICE (CHAINLINK STYLE) =====
let tokens = [
  {name:"ETH", price:0},
  {name:"USDT", price:1}
];

async function loadPrices(){
  let res = await fetch("https://min-api.cryptocompare.com/data/pricemulti?fsyms=ETH,USDT&tsyms=USD");
  let data = await res.json();

  tokens[0].price = data.ETH.USD;
  tokens[1].price = data.USDT.USD;

  renderTokens();
}

function renderTokens(){
  let html="";
  tokens.forEach(t=>{
    html+=`
      <div class="card">
        <div class="row">
          <div>${t.name}</div>
          <div>$${t.price}</div>
        </div>
      </div>
    `;
  });
  document.getElementById("tokens").innerHTML = html;
}

loadPrices();
setInterval(loadPrices,10000);

// ===== MARKET =====
async function loadMarket(){
  let res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd");
  let data = await res.json();

  let html="";
  data.slice(0,5).forEach(c=>{
    html+=`
    <div class="card">
      <div class="row">
        <div>${c.name}</div>
        <div>$${c.current_price}</div>
      </div>
      <div class="${c.price_change_percentage_24h>0?'green':'red'}">
        ${c.price_change_percentage_24h.toFixed(2)}%
      </div>
    </div>`;
  });

  document.getElementById("coins").innerHTML = html;
}
loadMarket();

// ===== BUY SELL USDT GLOBAL =====
let fxRates = {};

async function loadFX(){
  let res = await fetch("https://open.er-api.com/v6/latest/USD");
  let data = await res.json();
  fxRates = data.rates;
}
loadFX();

function buy(){
  let amount = prompt("USDT amount");
  let country = prompt("USD / VND / JPY");

  let cost = amount * fxRates[country.toUpperCase()];
  alert("Buy " + amount + " USDT ≈ " + cost + " " + country);
}

function sell(){
  let amount = prompt("USDT amount");
  let country = prompt("USD / VND / JPY");

  let receive = amount * fxRates[country.toUpperCase()];
  alert("Sell " + amount + " USDT ≈ " + receive + " " + country);
}

// ===== SHELBY STORAGE NFT =====
let nfts=[];

async function uploadToShelby(file){
  let form = new FormData();
  form.append("file",file);

  let res = await fetch("https://api.web3.storage/upload",{
    method:"POST",
    headers:{
      Authorization:"Bearer YOUR_API_KEY"
    },
    body:form
  });

  let data = await res.json();
  return data.cid;
}

async function createNFT(){
  let file = document.getElementById("file").files[0];
  if(!file) return;

  let cid = await uploadToShelby(file);

  let nft = {
    id:Date.now(),
    image:`https://ipfs.io/ipfs/${cid}`
  };

  nfts.push(nft);
  renderNFT();
}

function renderNFT(){
  let html="";
  nfts.forEach(n=>{
    html+=`
      <div class="card">
        <img src="${n.image}" width="100%">
      </div>
    `;
  });
  document.getElementById("nftList").innerHTML=html;
}

// ===== TAB =====
function showTab(tab){
  document.getElementById("wallet").style.display="none";
  document.getElementById("market").style.display="none";
  document.getElementById("trade").style.display="none";
  document.getElementById("nft").style.display="none";

  document.getElementById(tab).style.display="block";
}

</script>

</body>
</html>
