<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>vie wallet</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{margin:0;background:#050816;color:white;font-family:Arial}
.container{max-width:420px;margin:auto;padding:10px}
.card{background:#0b1220;margin:10px;padding:12px;border-radius:12px;overflow:hidden}

button{padding:10px;border:none;border-radius:10px;width:100%;cursor:pointer}
input{width:100%;padding:10px;background:#111;color:white;border:none;border-radius:8px;margin-top:5px}

.tabs{display:flex;justify-content:space-around}
.tab{cursor:pointer;padding:8px;background:#111;border-radius:6px;margin:2px;text-align:center}

.buy{background:#064e3b;color:#22c55e}
.sell{background:#7f1d1d;color:#ef4444}

/* MARKET */
.market-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.market-card{
background:#0b1220;
padding:12px;
border-radius:14px;
display:flex;
flex-direction:column;
gap:8px;
transition:0.2s;
}

.market-card:hover{
transform:scale(1.03);
background:#111827;
}

.market-price{
display:flex;
justify-content:space-between;
font-weight:bold;
}

/* CHART */
#tv_chart{
width:100%;
height:320px;
border-radius:12px;
overflow:hidden;
}

.timeframes{
display:flex;
gap:5px;
margin:10px 0;
}

.timeframes button{
flex:1;
background:#111;
color:#ccc;
padding:5px;
font-size:12px;
}

/* ORDERBOOK */
#asks div{color:#ef4444;font-size:12px}
#bids div{color:#22c55e;font-size:12px}

.fullscreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:9999;
}
</style>
</head>

<body>

<div class="container">

<h2>vie <span style="color:#22c55e">wallet</span></h2>

<div class="tabs">
<div class="tab" onclick="showOnly('wallet')">Wallet</div>
<div class="tab" onclick="showOnly('market')">Market</div>
<div class="tab" onclick="showOnly('p2p')">P2P</div>
<div class="tab" onclick="showOnly('nft')">NFT</div>
</div>

<!-- WALLET -->
<div id="wallet" class="card">
<button onclick="connectWallet()">Connect Wallet</button>
<p id="address"></p>
</div>

<!-- MARKET FUTURES -->
<div id="market" style="display:none">
<div id="marketList" class="market-grid"></div>
</div>

<!-- TRADE -->
<div id="trade" style="display:none">

<div class="card">
<h3 id="pair"></h3>
<h1 id="price"></h1>
<span id="change"></span>

<div class="timeframes">
<button onclick="setTF('1')">1m</button>
<button onclick="setTF('5')">5m</button>
<button onclick="setTF('15')">15m</button>
<button onclick="setTF('60')">1H</button>
<button onclick="setTF('1D')">1D</button>
<button onclick="toggleFull()">⛶</button>
</div>

<div id="tv_chart"></div>
</div>

<!-- TRADING PANEL FUTURES -->
<div class="card">
<input id="orderAmount" placeholder="Amount">
<button class="buy" onclick="placeOrder('LONG')">LONG</button>
<button class="sell" onclick="placeOrder('SHORT')">SHORT</button>
</div>

<!-- ORDERBOOK -->
<div class="card">
<h4>Order Book</h4>
<div style="display:flex">
<div style="width:50%" id="asks"></div>
<div style="width:50%" id="bids"></div>
</div>
</div>

</div>

<!-- P2P -->
<div id="p2p" class="card" style="display:none">
<input id="p2pAmount" placeholder="Amount">
<input id="p2pPrice" placeholder="Price">
<button onclick="createOffer()">Create</button>
<div id="offers"></div>
</div>

<!-- NFT -->
<div id="nft" class="card" style="display:none">
<input type="file" id="nftFile">
<button onclick="mintNFT()">Mint</button>
<div id="myNFTs"></div>
</div>

</div>

<script>

// WALLET
async function connectWallet(){
let provider=new ethers.providers.Web3Provider(window.ethereum);
await provider.send("eth_requestAccounts",[]);
let signer=provider.getSigner();
document.getElementById("address").innerText=await signer.getAddress();
}

// NAV
function showOnly(id){
["wallet","market","trade","p2p","nft"].forEach(t=>{
document.getElementById(t).style.display="none";
});
document.getElementById(id).style.display="block";
}

// ===== FUTURES MARKET REALTIME =====
let marketSockets={};

async function loadFuturesMarket(){

let res=await fetch("https://fapi.binance.com/fapi/v1/ticker/24hr");
let data=await res.json();

data=data
.filter(c=>c.symbol.endsWith("USDT"))
.sort((a,b)=>b.quoteVolume-a.quoteVolume)
.slice(0,10);

let html="";

data.forEach(c=>{
let change=parseFloat(c.priceChangePercent).toFixed(2);
let color=change>=0?"#22c55e":"#ef4444";

html+=`
<div class="market-card">

<div onclick="openTrade('${c.symbol}')">
<b>${c.symbol}</b><br><small>Perpetual</small>
</div>

<div class="market-price">
<span id="price-${c.symbol}">${parseFloat(c.lastPrice).toFixed(2)}</span>
<span id="change-${c.symbol}" style="color:${color}">
${change>0?"+":""}${change}%
</span>
</div>

<div style="display:flex;gap:5px">
<button class="buy" onclick="event.stopPropagation(); quickTrade('${c.symbol}','LONG')">Long</button>
<button class="sell" onclick="event.stopPropagation(); quickTrade('${c.symbol}','SHORT')">Short</button>
</div>

</div>`;
});

document.getElementById("marketList").innerHTML=html;

data.forEach(c=>startMarketStream(c.symbol));
}

loadFuturesMarket();

function startMarketStream(symbol){
if(marketSockets[symbol]) return;

let ws=new WebSocket(`wss://fstream.binance.com/ws/${symbol.toLowerCase()}@ticker`);

ws.onmessage=e=>{
let d=JSON.parse(e.data);

let priceEl=document.getElementById(`price-${symbol}`);
let changeEl=document.getElementById(`change-${symbol}`);

if(priceEl) priceEl.innerText=parseFloat(d.c).toFixed(2);

if(changeEl){
let change=parseFloat(d.P).toFixed(2);
changeEl.innerText=(change>0?"+":"")+change+"%";
changeEl.style.color=change>=0?"#22c55e":"#ef4444";
}
};

marketSockets[symbol]=ws;
}

// ===== TRADE =====
let currentSymbol="", currentTF="15", wsPrice, wsDepth;

function openTrade(symbol){
currentSymbol=symbol;
showOnly("trade");
document.getElementById("pair").innerText=symbol;

loadChart();
startStreams(symbol);
}

function loadChart(){
document.getElementById("tv_chart").innerHTML="";
new TradingView.widget({
container_id:"tv_chart",
symbol:"BINANCE:"+currentSymbol,
interval:currentTF,
theme:"dark",
autosize:true
});
}

function setTF(tf){
currentTF=tf;
loadChart();
}

function toggleFull(){
document.getElementById("tv_chart").classList.toggle("fullscreen");
}

function startStreams(symbol){

if(wsPrice) wsPrice.close();
wsPrice=new WebSocket(`wss://fstream.binance.com/ws/${symbol.toLowerCase()}@ticker`);
wsPrice.onmessage=e=>{
let d=JSON.parse(e.data);
document.getElementById("price").innerText=d.c;
document.getElementById("change").innerText=d.P+"%";
};

if(wsDepth) wsDepth.close();
wsDepth=new WebSocket(`wss://fstream.binance.com/ws/${symbol.toLowerCase()}@depth10@100ms`);
wsDepth.onmessage=e=>{
let d=JSON.parse(e.data);
document.getElementById("asks").innerHTML=d.asks.map(a=>a.join(" | ")).join("<br>");
document.getElementById("bids").innerHTML=d.bids.map(b=>b.join(" | ")).join("<br>");
};
}

// QUICK TRADE
function quickTrade(symbol,side){
openTrade(symbol);
setTimeout(()=>{
document.getElementById("orderAmount").value=1;
},300);
}

// ORDER
function placeOrder(type){
let amount=document.getElementById("orderAmount").value;
alert(type+" "+amount+" "+currentSymbol);
}

// P2P
let offers=[];
function createOffer(){
offers.push({
amount:document.getElementById("p2pAmount").value,
price:document.getElementById("p2pPrice").value
});
document.getElementById("offers").innerHTML=
offers.map(o=>`<div class="card">${o.amount} - ${o.price}</div>`).join("");
}

// NFT
let myNFTs=[];
function mintNFT(){
let f=document.getElementById("nftFile").files[0];
let url=URL.createObjectURL(f);
myNFTs.push(url);
document.getElementById("myNFTs").innerHTML=
myNFTs.map(n=>`<img src="${n}" width="100%">`).join("");
}

</script>

</body>
</html>
