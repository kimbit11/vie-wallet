<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIE Wallet</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Arial;background:#050816;color:white}
.header{padding:20px;text-align:center}
.balance{font-size:36px}
.container{max-width:420px;margin:auto}
.btn{padding:10px;border:none;border-radius:10px;background:#111;color:white;margin:5px;cursor:pointer}
.tabs{display:flex;justify-content:space-around;margin-top:10px}
.tab{padding:10px;cursor:pointer}
.active{color:#22c55e}
.card{background:#0b1220;margin:10px;padding:12px;border-radius:12px}
.flag{margin-left:6px}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:none;background:#111;color:white}
</style>
</head>
<body>

<div class="container">

<div class="header">
  <div class="balance" id="balance">$0.00</div>
  <button class="btn" onclick="connectWallet()">Connect Wallet</button>
  <button class="btn" onclick="createWallet()">Create Wallet</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('wallet')">Wallet</div>
  <div class="tab" onclick="showTab('market')">Market</div>
  <div class="tab" onclick="showTab('exchange')">Exchange</div>
  <div class="tab" onclick="showTab('nft')">NFT</div>
</div>

<div id="wallet">
  <div id="assets"></div>
</div>

<div id="market" style="display:none">
  <canvas id="chart"></canvas>
</div>

<div id="exchange" style="display:none">
  <div class="card">
    <input id="amount" placeholder="USDT amount">
    <select id="currency">
      <option value="USD">USD 🇺🇸</option>
      <option value="VND">VND 🇻🇳</option>
      <option value="JPY">JPY 🇯🇵</option>
      <option value="EUR">EUR 🇪🇺</option>
    </select>
    <button class="btn" onclick="buyUSDT()">Buy</button>
    <button class="btn" onclick="sellUSDT()">Sell</button>
    <p id="result"></p>
  </div>
</div>

<div id="nft" style="display:none">
  <div class="card">
    <input type="file" id="file">
    <button class="btn" onclick="uploadNFT()">Upload NFT</button>
  </div>
  <div id="nfts"></div>
</div>

</div>

<script>

// WALLET
let provider, signer;

async function connectWallet(){
  if(window.ethereum){
    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts",[]);
    signer = provider.getSigner();
    alert("Connected");
  }
}

function createWallet(){
  let wallet = ethers.Wallet.createRandom();
  alert("Private Key: " + wallet.privateKey);
}

// ASSETS
let assets=[{name:"ETH",balance:0},{name:"USDT",balance:0}];

function renderAssets(){
  let html="";
  assets.forEach(a=>{
    html+=`<div class='card'>${a.name}: ${a.balance}</div>`;
  });
  document.getElementById("assets").innerHTML=html;
}
renderAssets();

// MARKET CHART
async function loadChart(){
  let res = await fetch("https://api.coingecko.com/api/v3/coins/ethereum/market_chart?vs_currency=usd&days=1");
  let data = await res.json();
  let prices = data.prices.map(p=>p[1]);

  new Chart(document.getElementById("chart"),{
    type:"line",
    data:{labels:prices, datasets:[{data:prices}]}
  });
}
loadChart();

// FX
let rates={};
async function loadRates(){
  let res=await fetch("https://open.er-api.com/v6/latest/USD");
  let data=await res.json();
  rates=data.rates;
}
loadRates();

function buyUSDT(){
  let amount=document.getElementById("amount").value;
  let cur=document.getElementById("currency").value;
  let cost=amount*rates[cur];
  document.getElementById("result").innerText=`Buy ${amount} USDT ≈ ${cost} ${cur}`;
}

function sellUSDT(){
  let amount=document.getElementById("amount").value;
  let cur=document.getElementById("currency").value;
  let receive=amount*rates[cur];
  document.getElementById("result").innerText=`Sell ${amount} USDT ≈ ${receive} ${cur}`;
}

// NFT
let nftList=[];

function uploadNFT(){
  let file=document.getElementById("file").files[0];
  let url=URL.createObjectURL(file);
  nftList.push(url);
  renderNFT();
}

function renderNFT(){
  let html="";
  nftList.forEach(n=>{
    html+=`<div class='card'><img src='${n}' width='100%'></div>`;
  });
  document.getElementById("nfts").innerHTML=html;
}

// TAB
function showTab(tab){
  ["wallet","market","exchange","nft"].forEach(t=>{
    document.getElementById(t).style.display="none";
  });
  document.getElementById(tab).style.display="block";
}

</script>

</body>
</html>
