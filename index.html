<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>vie wallet</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{margin:0;background:#050816;color:white;font-family:Arial}
.container{max-width:420px;margin:auto;padding:10px}
.card{background:#0b1220;margin:10px;padding:12px;border-radius:12px;overflow:hidden}

button{padding:10px;border:none;border-radius:10px;width:100%;cursor:pointer}
input,select{width:100%;padding:10px;background:#111;color:white;border:none;border-radius:8px;margin-top:5px}

.tabs{display:flex;justify-content:space-around}
.tab{cursor:pointer;padding:8px;background:#111;border-radius:6px;margin:2px;text-align:center}

.buy{background:#064e3b;color:#22c55e}
.sell{background:#7f1d1d;color:#ef4444}

#asks div{color:#ef4444;font-size:12px}
#bids div{color:#22c55e;font-size:12px}

/* MARKET */
.market-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px
}

.market-card{
background:#0b1220;
padding:12px;
border-radius:14px;
transition:0.2s;
display:flex;
flex-direction:column;
gap:8px;
}

.market-card:hover{
transform:scale(1.03);
background:#111827;
}

.market-top{
display:flex;
gap:10px;
align-items:center;
cursor:pointer;
}

.market-price{
display:flex;
justify-content:space-between;
font-size:16px;
font-weight:bold;
}

.market-actions{
display:flex;
gap:6px;
}

.market-actions button{
flex:1;
font-size:12px;
padding:6px;
}

/* CHART */
#tv_chart{
width:100%;
height:320px;
border-radius:12px;
overflow:hidden;
}

.timeframes{
display:flex;
gap:6px;
margin:10px 0;
}

.timeframes button{
flex:1;
background:#111;
color:#ccc;
border-radius:6px;
padding:6px;
font-size:12px;
}

.fullscreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:9999;
}
</style>
</head>

<body>

<div class="container">

<h2>vie <span style="color:#22c55e">wallet</span></h2>

<div class="tabs">
<div class="tab" onclick="showOnly('wallet')">Wallet</div>
<div class="tab" onclick="showOnly('market')">Market</div>
<div class="tab" onclick="showOnly('p2p')">P2P</div>
<div class="tab" onclick="showOnly('nft')">NFT</div>
</div>

<!-- WALLET -->
<div id="wallet" class="card">
<button onclick="connectWallet()">Connect Wallet</button>
<p id="address"></p>
</div>

<!-- MARKET -->
<div id="market" style="display:none">
<input placeholder="Search coin..." onkeyup="searchToken()">
<div id="marketList" class="market-grid"></div>
</div>

<!-- TRADE -->
<div id="trade" style="display:none">

<div class="card">
<h3 id="pair"></h3>
<h1 id="price"></h1>
<span id="change"></span>

<div class="timeframes">
<button onclick="setTF('1')">1m</button>
<button onclick="setTF('5')">5m</button>
<button onclick="setTF('15')">15m</button>
<button onclick="setTF('60')">1H</button>
<button onclick="setTF('1D')">1D</button>
<button onclick="toggleFull()">⛶</button>
</div>

<div id="tv_chart"></div>
</div>

<div class="card">
<input id="orderPrice" placeholder="Price">
<input id="orderAmount" placeholder="Amount">
<button class="buy">BUY</button>
<button class="sell">SELL</button>
</div>

<div class="card">
<h4>Order Book</h4>
<div style="display:flex">
<div style="width:50%" id="asks"></div>
<div style="width:50%" id="bids"></div>
</div>
</div>

</div>

<!-- P2P -->
<div id="p2p" class="card" style="display:none">

<h3>P2P Trading</h3>

<select id="country" onchange="loadCountry()">
<option value="VN">Vietnam</option>
<option value="US">United States</option>
<option value="JP">Japan</option>
<option value="KR">Korea</option>
</select>

<select id="bank"></select>

<p>FX Rate: <span id="fxRate">...</span></p>

<input id="p2pAmount" placeholder="USDT Amount">
<input id="p2pPrice" placeholder="Price (auto)">

<label style="font-size:12px">
<input type="checkbox" id="kycCheck"> KYC Verified
</label>

<div style="display:flex;gap:6px;margin-top:6px">
<button class="buy" onclick="createOffer('BUY')">Buy</button>
<button class="sell" onclick="createOffer('SELL')">Sell</button>
</div>

<div id="offers"></div>

</div>

<!-- NFT -->
<div id="nft" class="card" style="display:none">
<input type="file" id="nftFile">
<button onclick="mintNFT()">Mint</button>
<div id="myNFTs"></div>
</div>

</div>

<script>

// WALLET
let provider, signer;
async function connectWallet(){
provider=new ethers.providers.Web3Provider(window.ethereum);
await provider.send("eth_requestAccounts",[]);
signer=provider.getSigner();
document.getElementById("address").innerText=await signer.getAddress();
}

// NAV
function showOnly(id){
["wallet","market","trade","p2p","nft"].forEach(t=>{
document.getElementById(t).style.display="none";
});
document.getElementById(id).style.display="block";
}

// MARKET
async function loadTopCoins(){
let res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&per_page=10");
let data=await res.json();

let html="";
data.forEach(c=>{
let change=c.price_change_percentage_24h.toFixed(2);
let color=change>=0?"#22c55e":"#ef4444";

html+=`
<div class="market-card">
<div class="market-top" onclick="openTrade('${c.symbol.toUpperCase()}USDT')">
<img src="${c.image}" width="28">
<div>
<b>${c.symbol.toUpperCase()}</b><br>
<small style="color:#888">${c.name}</small>
</div>
</div>

<div class="market-price">
$${c.current_price}
<span style="color:${color}">
${change>0?"+":""}${change}%
</span>
</div>

<div class="market-actions">
<button class="buy" onclick="event.stopPropagation(); quickTrade('${c.symbol.toUpperCase()}USDT','BUY')">Buy</button>
<button class="sell" onclick="event.stopPropagation(); quickTrade('${c.symbol.toUpperCase()}USDT','SELL')">Sell</button>
</div>
</div>`;
});

document.getElementById("marketList").innerHTML=html;
}
loadTopCoins();

// SEARCH
async function searchToken(){
let q=document.querySelector("#market input").value;
if(q.length<2)return;

let res=await fetch(`https://api.coingecko.com/api/v3/search?query=${q}`);
let data=await res.json();

let html="";
data.coins.slice(0,10).forEach(c=>{
html+=`<div class="market-card" onclick="openTrade('${c.symbol.toUpperCase()}USDT')">${c.name}</div>`;
});
document.getElementById("marketList").innerHTML=html;
}

// TRADE
let currentSymbol="", currentTF="15", wsPrice, wsDepth;

function openTrade(symbol){
currentSymbol=symbol;
showOnly("trade");
document.getElementById("pair").innerText=symbol;
loadChart();
startStreams(symbol);
}

function loadChart(){
document.getElementById("tv_chart").innerHTML="";
new TradingView.widget({
container_id:"tv_chart",
symbol:"BINANCE:"+currentSymbol,
interval:currentTF,
theme:"dark",
autosize:true
});
}

function setTF(tf){
currentTF=tf;
loadChart();
}

function toggleFull(){
document.getElementById("tv_chart").classList.toggle("fullscreen");
}

function startStreams(symbol){

if(wsPrice) wsPrice.close();
wsPrice=new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@ticker`);
wsPrice.onmessage=e=>{
let d=JSON.parse(e.data);
document.getElementById("price").innerText=d.c;
document.getElementById("change").innerText=d.P+"%";
};

if(wsDepth) wsDepth.close();
wsDepth=new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@depth10@100ms`);
wsDepth.onmessage=e=>{
let d=JSON.parse(e.data);
document.getElementById("asks").innerHTML=d.asks.map(a=>a.join(" | ")).join("<br>");
document.getElementById("bids").innerHTML=d.bids.map(b=>b.join(" | ")).join("<br>");
};
}

// QUICK TRADE
function quickTrade(symbol,side){
openTrade(symbol);
setTimeout(()=>{
document.getElementById("orderAmount").value=1;
},300);
}

// ===== P2P PRO =====
let offers=[];
let currentFX=0;

const banks={
VN:["Vietcombank","Techcombank","ACB"],
US:["Chase","Bank of America","Wells Fargo"],
JP:["MUFG","SMBC"],
KR:["Kookmin","Shinhan"]
};

function currencyMap(c){
return {
VN:"VND",
US:"USD",
JP:"JPY",
KR:"KRW"
}[c];
}

async function loadCountry(){
let c=document.getElementById("country").value;

document.getElementById("bank").innerHTML=
banks[c].map(b=>`<option>${b}</option>`).join("");

let res=await fetch("https://api.exchangerate-api.com/v4/latest/USD");
let data=await res.json();

currentFX=data.rates[currencyMap(c)];
document.getElementById("fxRate").innerText=currentFX;

updateP2PPrice();
}

function updateP2PPrice(){
let local=1*currentFX;
document.getElementById("p2pPrice").value=local.toFixed(2);
}

function createOffer(type){

let kyc=document.getElementById("kycCheck").checked;
if(!kyc){
alert("KYC required!");
return;
}

let offer={
type:type,
country:document.getElementById("country").value,
bank:document.getElementById("bank").value,
amount:document.getElementById("p2pAmount").value,
price:document.getElementById("p2pPrice").value
};

offers.push(offer);
renderOffers();
}

function renderOffers(){
document.getElementById("offers").innerHTML=
offers.map(o=>`
<div class="card">
<b>${o.type}</b> ${o.amount} USDT<br>
${o.price} (${o.country})<br>
 ${o.bank}
</div>
`).join("");
}

loadCountry();

// NFT
let myNFTs=[];
function mintNFT(){
let f=document.getElementById("nftFile").files[0];
let url=URL.createObjectURL(f);
myNFTs.push(url);
document.getElementById("myNFTs").innerHTML=
myNFTs.map(n=>`<img src="${n}" width="100%">`).join("");
}

</script>

</body>
</html>
