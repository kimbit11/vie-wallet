<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>vie wallet</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{margin:0;background:#050816;color:white;font-family:Arial}
.container{max-width:420px;margin:auto;padding:10px}

.card{background:#0b1220;margin:10px;padding:12px;border-radius:12px}

button{
padding:10px;border:none;border-radius:10px;width:100%;
cursor:pointer
}

input,select{
width:100%;padding:10px;background:#111;color:white;
border:none;border-radius:8px;margin-top:5px
}

.tabs{display:flex;justify-content:space-around}
.tab{cursor:pointer;padding:10px}

.market-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px
}

.market-item{
background:#0b1220;
padding:10px;
border-radius:12px;
cursor:pointer
}

.buy{background:#064e3b;color:#22c55e}
.sell{background:#7f1d1d;color:#ef4444}

#asks div{color:#ef4444;font-size:12px}
#bids div{color:#22c55e;font-size:12px}

.popup{
position:fixed;
bottom:0;
width:100%;
background:#1f2937;
padding:20px;
border-radius:20px 20px 0 0;
}
</style>
</head>

<body>

<div class="container">

<h2 style="letter-spacing:1px">
  vie <span style="color:#22c55e">wallet</span>
</h2>

<div class="tabs">
<div class="tab" onclick="show('wallet')">Wallet</div>
<div class="tab" onclick="show('market')">Market</div>
<div class="tab" onclick="show('p2p')">P2P</div>
<div class="tab" onclick="show('nft')">NFT</div>
</div>

<!-- WALLET -->
<div id="wallet" class="card">
<button onclick="connect()">Connect Wallet</button>
<p id="addr"></p>
</div>

<!-- MARKET -->
<div id="market" style="display:none">
<input placeholder="Search coin..." onkeyup="search()">
<div id="coins" class="market-grid"></div>
</div>

<!-- TRADE -->
<div id="trade" style="display:none">

<div class="card">
<h3 id="pair"></h3>
<h1 id="price"></h1>
<span id="change"></span>

<div id="chart" style="height:300px"></div>

<div style="display:flex;gap:10px">
<button class="buy" onclick="sendOrder('BUY')">BUY</button>
<button class="sell" onclick="sendOrder('SELL')">SELL</button>
</div>
</div>

<div class="card">
<h4>Order Book</h4>
<div style="display:flex">
<div style="width:50%" id="asks"></div>
<div style="width:50%" id="bids"></div>
</div>
</div>

</div>

<!-- P2P -->
<div id="p2p" class="card" style="display:none">

<div onclick="toggleCountry()" class="card">
<span id="countryLabel">Vietnam 🇻🇳</span>
</div>

<div id="countryPopup" class="popup" style="display:none">
<div onclick="setCountry('VN')">Vietnam 🇻🇳</div>
<div onclick="setCountry('US')">USA 🇺🇸</div>
<div onclick="setCountry('JP')">Japan 🇯🇵</div>
</div>

<select id="bank"></select>

<input id="p2pAmount" placeholder="USDT amount">
<input id="p2pPrice" placeholder="Price">

<button onclick="createP2P()">Create Offer</button>

<div id="offers"></div>

</div>

<!-- NFT -->
<div id="nft" class="card" style="display:none">
<input type="file" id="file">
<button onclick="mint()">Mint NFT</button>
<div id="nfts"></div>
</div>

</div>

<script>

// ===== WALLET =====
let provider, signer;

async function connect(){
provider=new ethers.providers.Web3Provider(window.ethereum);
await provider.send("eth_requestAccounts",[]);
signer=provider.getSigner();
document.getElementById("addr").innerText=await signer.getAddress();
}

// ===== NAV =====
function show(id){
["wallet","market","trade","p2p","nft"].forEach(x=>{
document.getElementById(x).style.display="none";
});
document.getElementById(id).style.display="block";
}

// ===== MARKET =====
async function loadCoins(){
let res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&per_page=10");
let data=await res.json();

let html="";
data.forEach(c=>{
html+=`
<div class="market-item" onclick="openTrade('${c.symbol.toUpperCase()}USDT')">
<b>${c.symbol.toUpperCase()}</b><br>$${c.current_price}
</div>`;
});

document.getElementById("coins").innerHTML=html;
}
loadCoins();

async function search(){
let q=document.querySelector("#market input").value;
if(q.length<2)return;

let res=await fetch(`https://api.coingecko.com/api/v3/search?query=${q}`);
let data=await res.json();

let html="";
data.coins.slice(0,5).forEach(c=>{
html+=`
<div class="market-item" onclick="openTrade('${c.symbol.toUpperCase()}USDT')">
${c.name}
</div>`;
});

document.getElementById("coins").innerHTML=html;
}

// ===== TRADE =====
let wsPrice, wsDepth, currentSymbol;

function openTrade(sym){

currentSymbol=sym;
show("trade");

document.getElementById("pair").innerText=sym;

document.getElementById("chart").innerHTML="";
new TradingView.widget({
container_id:"chart",
symbol:"BINANCE:"+sym,
height:300,
theme:"dark"
});

// realtime price
if(wsPrice) wsPrice.close();
wsPrice=new WebSocket(`wss://stream.binance.com:9443/ws/${sym.toLowerCase()}@ticker`);

wsPrice.onmessage=e=>{
let d=JSON.parse(e.data);

let price=parseFloat(d.c).toFixed(2);
document.getElementById("price").innerText=price;

let ch=parseFloat(d.P).toFixed(2);
let el=document.getElementById("change");

el.innerText=(ch>0?"+":"")+ch+"%";
el.style.color=ch>=0?"#22c55e":"#ef4444";
};

// orderbook
if(wsDepth) wsDepth.close();
wsDepth=new WebSocket(`wss://stream.binance.com:9443/ws/${sym.toLowerCase()}@depth10@100ms`);

wsDepth.onmessage=e=>{
let d=JSON.parse(e.data);

document.getElementById("asks").innerHTML=
d.asks.map(a=>a.join(" | ")).join("<br>");

document.getElementById("bids").innerHTML=
d.bids.map(b=>b.join(" | ")).join("<br>");
};

}

// ===== MATCHING ENGINE WS =====
let socket=new WebSocket("ws://localhost:5000");

function sendOrder(type){
socket.send(JSON.stringify({
type:"ORDER",
order:{
type:type,
price:document.getElementById("price").innerText,
amount:1
}
}));
}

// ===== P2P =====
const BANKS={
VN:["Vietcombank"],
US:["Chase"],
JP:["Mizuho"]
};

let country="VN";

function toggleCountry(){
let el=document.getElementById("countryPopup");
el.style.display=el.style.display==="none"?"block":"none";
}

function setCountry(c){
country=c;
document.getElementById("countryLabel").innerText=c;
document.getElementById("countryPopup").style.display="none";

let html="";
BANKS[c].forEach(b=>html+=`<option>${b}</option>`);
document.getElementById("bank").innerHTML=html;
}
setCountry("VN");

function createP2P(){
let html=document.getElementById("offers").innerHTML;

html+=`
<div class="card">
${document.getElementById("p2pAmount").value} USDT
</div>`;

document.getElementById("offers").innerHTML=html;
}

// ===== NFT =====
let nfts=[];

function mint(){
let f=document.getElementById("file").files[0];
let url=URL.createObjectURL(f);

nfts.push(url);

document.getElementById("nfts").innerHTML=
nfts.map(n=>`<img src="${n}" width="100%">`).join("");
}

</script>

</body>
</html>
