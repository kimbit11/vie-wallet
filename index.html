<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIE Global Crypto Wallet</title>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: white;
  margin: 0;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

h2 {
  text-align: center;
}

.tabs {
  display: flex;
  margin-bottom: 10px;
}

.tab {
  flex: 1;
  padding: 10px;
  background: #0f172a;
  border: none;
  color: white;
  cursor: pointer;
}

.tab.active {
  background: #22c55e;
}

.box {
  background: #0f172a;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
}

input, select {
  width: 95%;
  padding: 8px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #22c55e;
  cursor: pointer;
  margin: 3px;
}

.card {
  background: #020617;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}

img {
  width: 100%;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">

<h2>🌍 VIE Global Wallet</h2>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="showTab('wallet')">Wallet</button>
  <button class="tab" onclick="showTab('exchange')">Exchange</button>
  <button class="tab" onclick="showTab('nft')">NFT</button>
</div>

<!-- WALLET -->
<div id="wallet" class="tabContent">
  <div class="box">
    <h4>💼 Balance</h4>
    <p id="usdt">USDT: 100</p>
    <p id="eth">ETH: 2</p>
  </div>

  <div class="box">
    <h4>📊 Crypto Price</h4>
    <p id="price">Loading...</p>
  </div>
</div>

<!-- EXCHANGE -->
<div id="exchange" class="tabContent" style="display:none">

  <div class="box">
    <h4>🌍 Buy / Sell USDT</h4>

    <input id="amount" placeholder="Enter USDT">

    <select id="country">
      <option value="usd">USA 🇺🇸</option>
      <option value="jpy">Japan 🇯🇵</option>
      <option value="vnd">Vietnam 🇻🇳</option>
      <option value="eur">Europe 🇪🇺</option>
      <option value="sgd">Singapore 🇸🇬</option>
    </select>

    <button onclick="buyUSDT()">Buy</button>
    <button onclick="sellUSDT()">Sell</button>

    <p id="result"></p>
  </div>

</div>

<!-- NFT -->
<div id="nft" class="tabContent" style="display:none">

  <div class="box">
    <h4>Create NFT</h4>
    <input id="name" placeholder="Name">
    <input id="image" placeholder="Image URL">
    <input id="priceNFT" placeholder="Price ETH">
    <button onclick="createNFT()">Create</button>
  </div>

  <div id="market"></div>

</div>

</div>

<script>

// ===== TAB =====
function showTab(tab) {
  document.querySelectorAll(".tabContent").forEach(t => t.style.display = "none");
  document.getElementById(tab).style.display = "block";

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
}

// ===== BALANCE =====
let usdtBalance = 100;
let ethBalance = 2;

function updateBalance() {
  document.getElementById("usdt").innerText = "USDT: " + usdtBalance;
  document.getElementById("eth").innerText = "ETH: " + ethBalance;
}

// ===== PRICE =====
async function getPrice() {
  let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ethereum,tether&vs_currencies=usd");
  let data = await res.json();

  document.getElementById("price").innerText =
    "ETH: $" + data.ethereum.usd + " | USDT: $" + data.tether.usd;
}

getPrice();
setInterval(getPrice, 10000);

// ===== EXCHANGE =====
let rates = {};

async function fetchRates() {
  let res = await fetch(
    "https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=usd,jpy,vnd,eur,sgd"
  );
  let data = await res.json();
  rates = data.tether;
}

fetchRates();

function buyUSDT() {
  let amount = parseFloat(document.getElementById("amount").value);
  let country = document.getElementById("country").value;

  if (!amount) return;

  let cost = amount * rates[country];

  usdtBalance += amount;
  updateBalance();

  document.getElementById("result").innerText =
    "Bought " + amount + " USDT ≈ " +
    cost.toLocaleString() + " " + country.toUpperCase();
}

function sellUSDT() {
  let amount = parseFloat(document.getElementById("amount").value);
  let country = document.getElementById("country").value;

  if (usdtBalance < amount) {
    alert("Not enough USDT");
    return;
  }

  let received = amount * rates[country];

  usdtBalance -= amount;
  updateBalance();

  document.getElementById("result").innerText =
    "Sold " + amount + " USDT ≈ " +
    received.toLocaleString() + " " + country.toUpperCase();
}

// ===== NFT =====
let nfts = [];

function createNFT() {
  let name = document.getElementById("name").value;
  let image = document.getElementById("image").value;
  let price = parseFloat(document.getElementById("priceNFT").value);

  if (!name || !image || !price) return;

  nfts.push({
    id: Date.now(),
    name,
    image,
    price,
    owner: "me"
  });

  renderNFT();
}

function buyNFT(id) {
  let nft = nfts.find(n => n.id === id);

  if (ethBalance < nft.price) {
    alert("Not enough ETH");
    return;
  }

  ethBalance -= nft.price;
  nft.owner = "me";
  updateBalance();
  renderNFT();
}

function sellNFT(id) {
  let nft = nfts.find(n => n.id === id);
  nft.owner = "market";
  renderNFT();
}

function renderNFT() {
  let html = "";

  nfts.forEach(nft => {
    html += `
      <div class="card">
        <img src="${nft.image}">
        <h4>${nft.name}</h4>
        <p>${nft.price} ETH</p>
        <p>${nft.owner}</p>
        ${
          nft.owner === "market"
          ? `<button onclick="buyNFT(${nft.id})">Buy</button>`
          : `<button onclick="sellNFT(${nft.id})">Sell</button>`
        }
      </div>
    `;
  });

  document.getElementById("market").innerHTML = html;
}

updateBalance();

</script>

</body>
</html>
