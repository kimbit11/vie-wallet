<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIE Wallet</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{margin:0;background:#050816;color:white;font-family:Arial}
.container{max-width:420px;margin:auto;padding:10px}
.card{background:#0b1220;margin:10px;padding:12px;border-radius:12px}
button{padding:10px;border:none;border-radius:10px;width:100%}
input,select{width:100%;padding:10px;background:#111;color:white;border:none;border-radius:8px;margin-top:5px}
.tabs{display:flex;justify-content:space-around}
.tab{cursor:pointer;padding:10px}
.market-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.market-item{background:#0b1220;padding:10px;border-radius:12px}
.buy{background:#064e3b;color:#22c55e}
.sell{background:#7f1d1d;color:#ef4444}
</style>

</head>

<body>

<div class="container">

<h2>VIE Wallet</h2>

<select onchange="switchChain(this.value)">
  <option value="0x1">Ethereum</option>
  <option value="0x38">BSC</option>
  <option value="0x89">Polygon</option>
</select>

<div class="tabs">
  <div class="tab" onclick="showTab('wallet')">Wallet</div>
  <div class="tab" onclick="showTab('market')">Market</div>
  <div class="tab" onclick="showTab('p2p')">P2P</div>
  <div class="tab" onclick="showTab('nft')">NFT</div>
</div>

<!-- WALLET -->
<div id="wallet" class="card">
<button onclick="connectWallet()">Connect Wallet</button>
<p id="address"></p>
<p id="balance"></p>
</div>

<!-- MARKET -->
<div id="market" style="display:none">

<input placeholder="Search..." onkeyup="searchToken()">

<div id="marketList" class="market-grid"></div>

</div>

<!-- TRADE -->
<div id="trade" style="display:none">

<div class="card">
<h3 id="pair"></h3>
<h1 id="price"></h1>
<span id="change"></span>

<div id="tv_chart" style="height:400px"></div>

<div style="display:flex;gap:10px;margin-top:10px">
<button class="buy">MUA</button>
<button class="sell">BÁN</button>
</div>

</div>

</div>

<!-- P2P -->
<div id="p2p" class="card" style="display:none">

<h3>P2P Global</h3>

<select id="country" onchange="updateBanks()">
<option value="VN">Vietnam</option>
<option value="US">USA</option>
<option value="JP">Japan</option>
</select>

<select id="bank"></select>

<input id="p2pAmount" placeholder="USDT amount">
<input id="p2pPrice" placeholder="Price">

<button onclick="createOffer()">Create Offer</button>

<div id="offers"></div>

</div>

<!-- NFT -->
<div id="nft" class="card" style="display:none">

<input type="file" id="nftFile">
<input id="nftName" placeholder="NFT name">
<button onclick="mintNFT()">Mint</button>

<div id="myNFTs"></div>
<div id="marketNFTs"></div>

</div>

</div>

<script>

// ===== WALLET =====
let provider, signer, userAddress;

async function connectWallet(){
  provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts",[]);
  signer = provider.getSigner();
  userAddress = await signer.getAddress();

  document.getElementById("address").innerText=userAddress;

  let bal = await provider.getBalance(userAddress);
  document.getElementById("balance").innerText=
    ethers.utils.formatEther(bal)+" ETH";
}

// ===== CHAIN =====
async function switchChain(chainId){
  await window.ethereum.request({
    method:"wallet_switchEthereumChain",
    params:[{chainId}]
  });
}

// ===== MARKET =====
let marketData = [
{symbol:"BTCUSDT",price:69133,change:2.4},
{symbol:"ETHUSDT",price:2152,change:4.3},
{symbol:"BNBUSDT",price:619,change:1.2}
];

function renderMarket(){
  let html="";
  marketData.forEach(c=>{
    html+=`
    <div class="market-item" onclick="openTrade('${c.symbol}',${c.price},${c.change})">
      ${c.symbol}<br>
      ${c.price}<br>
      ${c.change}%
      <div style="display:flex">
        <button class="buy">Mua</button>
        <button class="sell">Bán</button>
      </div>
    </div>`;
  });
  document.getElementById("marketList").innerHTML=html;
}
renderMarket();

// ===== TRADE =====
function openTrade(symbol, price, change){

  showOnly("trade");

  document.getElementById("pair").innerText=symbol;
  document.getElementById("price").innerText=price;
  document.getElementById("change").innerText=change+"%";

  document.getElementById("tv_chart").innerHTML="";

  new TradingView.widget({
    container_id:"tv_chart",
    symbol:"BINANCE:"+symbol,
    interval:"15",
    theme:"dark"
  });
}

// ===== P2P =====
const COUNTRIES={
VN:{currency:"VND",banks:["Vietcombank"]},
US:{currency:"USD",banks:["Chase"]}
};

function updateBanks(){
  let c=document.getElementById("country").value;
  let html="";
  COUNTRIES[c].banks.forEach(b=>html+=`<option>${b}</option>`);
  document.getElementById("bank").innerHTML=html;
}
updateBanks();

let offers=[];

function createOffer(){
  let c=document.getElementById("country").value;

  offers.push({
    id:Date.now(),
    bank:document.getElementById("bank").value,
    amount:document.getElementById("p2pAmount").value,
    price:document.getElementById("p2pPrice").value,
    currency:COUNTRIES[c].currency
  });

  renderOffers();
}

function renderOffers(){
  let html="";
  offers.forEach(o=>{
    html+=`
    <div class="card">
      ${o.amount} USDT - ${o.price} ${o.currency}
      <button onclick="buyP2P(${o.id})">Buy</button>
    </div>`;
  });
  document.getElementById("offers").innerHTML=html;
}

function buyP2P(id){
  alert("Transfer bank then confirm");
}

// ===== NFT =====
let myNFTs=[],marketNFTs=[];

function mintNFT(){
  let file=document.getElementById("nftFile").files[0];
  let url=URL.createObjectURL(file);

  let nft={id:Date.now(),image:url};
  myNFTs.push(nft);
  renderNFT();
}

function renderNFT(){
  let html="";
  myNFTs.forEach(n=>{
    html+=`<div class="card">
      <img src="${n.image}" width="100%">
    </div>`;
  });
  document.getElementById("myNFTs").innerHTML=html;
}

// ===== NAV =====
function showOnly(id){
  ["wallet","market","trade","p2p","nft"].forEach(t=>{
    document.getElementById(t).style.display="none";
  });
  document.getElementById(id).style.display="block";
}

function showTab(tab){
  showOnly(tab);
}

</script>

</body>
</html>
