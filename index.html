<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>vie wallet pro</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>
<script src="https://unpkg.com/aptos@latest/dist/index.js"></script>

<style>
body{margin:0;background:#050816;color:white;font-family:Arial}
.container{max-width:420px;margin:auto;padding:10px}
.card{background:#0b1220;margin:10px;padding:12px;border-radius:12px}

button{padding:10px;border:none;border-radius:10px;width:100%;cursor:pointer}
input{width:100%;padding:10px;background:#111;color:white;border:none;border-radius:8px;margin-top:5px}

.tabs{display:flex;justify-content:space-around}
.tab{padding:8px;background:#111;border-radius:6px;margin:2px;cursor:pointer;text-align:center}

.market-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.market-card{background:#0b1220;padding:12px;border-radius:12px;transition:.2s}
.market-card:hover{transform:scale(1.03);background:#111827}

.buy{background:#064e3b;color:#22c55e}
.sell{background:#7f1d1d;color:#ef4444}

#tv_chart{width:100%;height:320px}
.fullscreen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999}

#asks div{color:#ef4444;font-size:12px}
#bids div{color:#22c55e;font-size:12px}
</style>
</head>

<body>

<div class="container">

<h2>vie <span style="color:#22c55e">wallet</span> pro</h2>

<div class="tabs">
<div class="tab" onclick="showOnly('wallet')">Wallet</div>
<div class="tab" onclick="showOnly('market')">Market</div>
<div class="tab" onclick="showOnly('p2p')">P2P</div>
<div class="tab" onclick="showOnly('nft')">NFT</div>
</div>

<!-- WALLET -->
<div id="wallet" class="card">
<button onclick="connectWallet()">Connect EVM</button>
<button onclick="connectAptos()">Connect Aptos</button>
<p id="address"></p>
</div>

<!-- MARKET -->
<div id="market" style="display:none">
<input placeholder="Search coin..." onkeyup="searchToken()">
<div id="marketList" class="market-grid"></div>
</div>

<!-- TRADE -->
<div id="trade" style="display:none">

<div class="card">
<h3 id="pair"></h3>
<h1 id="price"></h1>
<span id="change"></span>

<button onclick="toggleFull()">⛶</button>
<div id="tv_chart"></div>
</div>

<div class="card">
<input id="orderAmount" placeholder="Amount">
<button class="buy">BUY</button>
<button class="sell">SELL</button>
</div>

<div class="card">
<h4>Order Book</h4>
<div id="asks"></div>
<div id="bids"></div>
</div>

</div>

<!-- P2P -->
<div id="p2p" class="card" style="display:none">
<input id="p2pAmount" placeholder="Amount">
<input id="p2pPrice" placeholder="Price">
<button onclick="createOffer()">Create</button>
<div id="offers"></div>
</div>

<!-- NFT -->
<div id="nft" class="card" style="display:none">
<input type="file" id="nftFile">
<button onclick="mintNFT()">Mint (Shelby)</button>
<div id="myNFTs"></div>
</div>

</div>

<script>

// ===== NAV =====
function showOnly(id){
["wallet","market","trade","p2p","nft"].forEach(t=>{
document.getElementById(t).style.display="none";
});
document.getElementById(id).style.display="block";
}

// ===== EVM WALLET =====
async function connectWallet(){
try{
const provider=new ethers.providers.Web3Provider(window.ethereum);
await provider.send("eth_requestAccounts",[]);
const signer=provider.getSigner();
const addr=await signer.getAddress();
const balance=await provider.getBalance(addr);

document.getElementById("address").innerText=
"EVM: "+addr+"\nBalance: "+(balance/1e18).toFixed(4)+" ETH";
}catch(e){
alert("Wallet error");
}
}

// ===== APTOS =====
let aptosClient=new window.AptosClient("https://fullnode.mainnet.aptoslabs.com");

async function connectAptos(){
let acc=new window.AptosAccount();

let res=await aptosClient.getAccountResources(acc.address());
let coin=res.find(r=>r.type.includes("CoinStore"));
let bal=coin?coin.data.coin.value/1e8:0;

document.getElementById("address").innerText=
"Aptos: "+acc.address().hex()+"\nBalance: "+bal+" APT";
}

// ===== MARKET (FULL UI GIỐNG BẢN GỐC) =====
async function loadCoins(){
let res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&per_page=10");
let data=await res.json();

let html="";

data.forEach(c=>{
let change=c.price_change_percentage_24h.toFixed(2);
let color=change>=0?"#22c55e":"#ef4444";

html+=`
<div class="market-card">

<div onclick="openTrade('${c.symbol.toUpperCase()}USDT')">
<img src="${c.image}" width="28">
<b>${c.symbol.toUpperCase()}</b>
</div>

<div>
$${c.current_price}
<span style="color:${color}">
${change>0?"+":""}${change}%
</span>
</div>

<div>
<button class="buy" onclick="event.stopPropagation(); quickTrade('${c.symbol.toUpperCase()}USDT')">Buy</button>
<button class="sell" onclick="event.stopPropagation(); quickTrade('${c.symbol.toUpperCase()}USDT')">Sell</button>
</div>

</div>`;
});

document.getElementById("marketList").innerHTML=html;
}
loadCoins();

// SEARCH
async function searchToken(){
let q=document.querySelector("#market input").value;

if(q.length<2){
loadCoins();
return;
}

let res=await fetch(`https://api.coingecko.com/api/v3/search?query=${q}`);
let data=await res.json();

let html="";
data.coins.slice(0,10).forEach(c=>{
html+=`
<div class="market-card" onclick="openTrade('${c.symbol.toUpperCase()}USDT')">
${c.name}
</div>`;
});

document.getElementById("marketList").innerHTML=html;
}

// ===== TRADE =====
let wsPrice, wsDepth, currentSymbol="";

function openTrade(symbol){
currentSymbol=symbol;
showOnly("trade");

document.getElementById("pair").innerText=symbol;

document.getElementById("tv_chart").innerHTML="";
new TradingView.widget({
container_id:"tv_chart",
symbol:"BINANCE:"+symbol,
interval:"15",
theme:"dark"
});

startStreams(symbol);
}

function quickTrade(symbol){
openTrade(symbol);
setTimeout(()=>{
document.getElementById("orderAmount").value=1;
},200);
}

// ===== CHAINLINK =====
const feeds={
ETH:"0x5f4ec3df9cbd43714fe2740f5e3616155c5b8419",
BTC:"0xf4030086522a5beea4988f8ca5b36dbc97bee88c"
};

const abi=["function latestRoundData() view returns (uint80,int256,uint256,uint256,uint80)"];

async function getCL(symbol){
if(!feeds[symbol]) return null;

try{
const provider=new ethers.providers.Web3Provider(window.ethereum);
const c=new ethers.Contract(feeds[symbol],abi,provider);
let d=await c.latestRoundData();
return d[1]/1e8;
}catch{
return null;
}
}

// ===== STREAM =====
function startStreams(symbol){

if(wsPrice) wsPrice.close();
wsPrice=new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@ticker`);

wsPrice.onmessage=async e=>{
let d=JSON.parse(e.data);

let cl=await getCL(symbol.replace("USDT",""));

document.getElementById("price").innerText=
d.c+(cl?" | CL:"+cl.toFixed(2):"");

document.getElementById("change").innerText=d.P+"%";
};

if(wsDepth) wsDepth.close();
wsDepth=new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@depth10@100ms`);

wsDepth.onmessage=e=>{
let d=JSON.parse(e.data);

document.getElementById("asks").innerHTML=
d.asks.map(a=>"<div>"+a.join(" | ")+"</div>").join("");

document.getElementById("bids").innerHTML=
d.bids.map(b=>"<div>"+b.join(" | ")+"</div>").join("");
};
}

function toggleFull(){
document.getElementById("tv_chart").classList.toggle("fullscreen");
}

// ===== P2P =====
let offers=JSON.parse(localStorage.getItem("offers")||"[]");

function createOffer(){
offers.push({
amount:document.getElementById("p2pAmount").value,
price:document.getElementById("p2pPrice").value
});
localStorage.setItem("offers",JSON.stringify(offers));
renderOffers();
}

function renderOffers(){
document.getElementById("offers").innerHTML=
offers.map(o=>`<div class="card">${o.amount} USDT - ${o.price}</div>`).join("");
}
renderOffers();

// ===== SHELBY NFT =====
let myNFTs=[];

async function mintNFT(){
let f=document.getElementById("nftFile").files[0];
if(!f) return alert("Chọn file");

let form=new FormData();
form.append("file",f);

let cid="demoCID";

try{
let res=await fetch("https://api.shelby.xyz/upload",{
method:"POST",
body:form
});
let d=await res.json();
cid=d.cid;
}catch{}

let url="https://gateway.shelby.xyz/ipfs/"+cid;

myNFTs.push(url);

document.getElementById("myNFTs").innerHTML=
myNFTs.map(n=>`<img src="${n}" width="100%">`).join("");
}

</script>

</body>
</html>
