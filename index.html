<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIE Wallet </title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{margin:0;background:#050816;color:white;font-family:Arial}
.container{max-width:420px;margin:auto;padding:10px}
.card{background:#0b1220;margin:10px;padding:12px;border-radius:12px}
button{padding:10px;background:#111;color:white;border:none;border-radius:10px;margin-top:5px;width:100%}
input,select{width:100%;padding:10px;background:#111;color:white;border:none;border-radius:8px;margin-top:5px}
.tabs{display:flex;justify-content:space-around;margin-top:10px}
.tab{cursor:pointer;padding:10px}
img{border-radius:10px}
</style>
</head>

<body>

<div class="container">

<h2>VIE Wallet Pro</h2>

<div class="tabs">
  <div class="tab" onclick="showTab('wallet')">Wallet</div>
  <div class="tab" onclick="showTab('market')">Market</div>
  <div class="tab" onclick="showTab('swap')">Swap</div>
  <div class="tab" onclick="showTab('fiat')">Fiat</div>
  <div class="tab" onclick="showTab('p2p')">P2P</div>
  <div class="tab" onclick="showTab('nft')">NFT</div>
</div>

<!-- WALLET -->
<div id="wallet" class="card">
  <button onclick="connectWallet()">Connect Wallet</button>
  <p id="address"></p>
  <p id="balance"></p>
</div>

<!-- MARKET -->
<div id="market" class="card" style="display:none">
  <input id="search" placeholder="Search token..." onkeyup="searchToken()">
  <div id="results"></div>
  <div id="chart" style="height:300px;margin-top:10px"></div>
</div>

<!-- SWAP -->
<div id="swap" class="card" style="display:none">
  <input id="amount" placeholder="ETH amount">
  <button onclick="swapETHtoUSDT()">Swap ETH → USDT</button>
</div>

<!-- FIAT -->
<div id="fiat" class="card" style="display:none">
  <input id="fiatAmount" placeholder="Amount USD">
  <button onclick="buyFiat()">Buy USDT (Transak)</button>
</div>

<!-- P2P -->
<div id="p2p" class="card" style="display:none">
  <h3>P2P Marketplace</h3>

  <input id="p2pAmount" placeholder="USDT amount">
  <input id="p2pPrice" placeholder="Price (VND)">
  <button onclick="createOffer()">Create Sell Offer</button>

  <div id="offers"></div>
</div>

<!-- NFT -->
<div id="nft" class="card" style="display:none">

  <h3>NFT Marketplace</h3>

  <input type="file" id="nftFile">
  <input id="nftName" placeholder="NFT Name">
  <button onclick="mintNFT()">Mint NFT</button>

  <h4>Your NFTs</h4>
  <div id="myNFTs"></div>

  <h4>Marketplace</h4>
  <div id="marketNFTs"></div>

</div>

</div>

<script>

// CONFIG
const USDT = "0xdAC17F958D2ee523a2206206994597C13D831ec7";
const WETH = "0xC02aaa39b223FE8D0A0E5C4F27eAD9083C756Cc2";
const ROUTER = "0x7a250d5630b4cf539739df2c5dacab4c659f2488";

// STATE
let provider, signer, userAddress;

// WALLET
async function connectWallet(){
  if(!window.ethereum) return alert("Install MetaMask");

  provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts",[]);
  signer = provider.getSigner();
  userAddress = await signer.getAddress();

  document.getElementById("address").innerText = userAddress;

  loadBalance();
}

async function loadBalance(){
  let bal = await provider.getBalance(userAddress);
  document.getElementById("balance").innerText =
    parseFloat(ethers.utils.formatEther(bal)).toFixed(4)+" ETH";
}

// SWAP (Uniswap)
async function swapETHtoUSDT(){
  let amount = document.getElementById("amount").value;

  const router = new ethers.Contract(ROUTER, [
    "function swapExactETHForTokens(uint,address[],address,uint) payable"
  ], signer);

  await router.swapExactETHForTokens(
    0,
    [WETH, USDT],
    userAddress,
    Math.floor(Date.now()/1000)+600,
    { value: ethers.utils.parseEther(amount) }
  );

  alert("Swap completed!");
}

// SEARCH TOKEN
async function searchToken(){
  let q = document.getElementById("search").value;
  if(q.length < 2) return;

  let res = await fetch(`https://api.coingecko.com/api/v3/search?query=${q}`);
  let data = await res.json();

  let html="";
  data.coins.slice(0,5).forEach(c=>{
    html+=`<div class="card" onclick="loadChart('${c.symbol.toUpperCase()}USDT')">
      ${c.name} (${c.symbol})
    </div>`;
  });

  document.getElementById("results").innerHTML = html;
}

// CHART (TradingView)
function loadChart(symbol){
  document.getElementById("chart").innerHTML="";
  new TradingView.widget({
    container_id:"chart",
    width:"100%",
    height:300,
    symbol:"BINANCE:"+symbol,
    interval:"15",
    theme:"dark"
  });
}

// FIAT (Transak)
function buyFiat(){
  let amount = document.getElementById("fiatAmount").value;

  let url = `https://global.transak.com?apiKey=YOUR_KEY
  &cryptoCurrencyCode=USDT
  &fiatAmount=${amount}
  &walletAddress=${userAddress}`;

  window.open(url,"_blank");
}

// P2P
let offers=[];

function createOffer(){
  let amount = document.getElementById("p2pAmount").value;
  let price = document.getElementById("p2pPrice").value;

  offers.push({seller:userAddress,amount,price});
  renderOffers();
}

function renderOffers(){
  let html="";
  offers.forEach((o,i)=>{
    html+=`
      <div class="card">
        ${o.amount} USDT - ${o.price} VND
        <button onclick="buyP2P(${i})">Buy</button>
      </div>`;
  });
  document.getElementById("offers").innerHTML=html;
}

function buyP2P(i){
  alert("Connect escrow contract here");
}

// NFT
let myNFTs=[];
let marketNFTs=[];

function mintNFT(){
  let file=document.getElementById("nftFile").files[0];
  let name=document.getElementById("nftName").value;

  if(!file) return alert("Upload file");

  let url=URL.createObjectURL(file);

  let nft={id:Date.now(),name,image:url,owner:userAddress,price:null};

  myNFTs.push(nft);
  renderMyNFTs();
}

function renderMyNFTs(){
  let html="";
  myNFTs.forEach(n=>{
    html+=`
      <div class="card">
        <img src="${n.image}" width="100%">
        <p>${n.name}</p>
        <input id="price-${n.id}" placeholder="Price ETH">
        <button onclick="listNFT(${n.id})">Sell</button>
      </div>`;
  });
  document.getElementById("myNFTs").innerHTML=html;
}

function listNFT(id){
  let nft=myNFTs.find(n=>n.id==id);
  let price=document.getElementById("price-"+id).value;

  nft.price=price;
  marketNFTs.push(nft);
  renderMarketNFTs();
}

function renderMarketNFTs(){
  let html="";
  marketNFTs.forEach(n=>{
    html+=`
      <div class="card">
        <img src="${n.image}" width="100%">
        <p>${n.name}</p>
        <p>${n.price} ETH</p>
        <button onclick="buyNFT(${n.id})">Buy</button>
      </div>`;
  });
  document.getElementById("marketNFTs").innerHTML=html;
}

async function buyNFT(id){
  let nft=marketNFTs.find(n=>n.id==id);

  let tx = await signer.sendTransaction({
    to: nft.owner,
    value: ethers.utils.parseEther(nft.price)
  });

  await tx.wait();

  nft.owner=userAddress;
  alert("NFT purchased!");
}

// TAB
function showTab(tab){
  ["wallet","market","swap","fiat","p2p","nft"].forEach(t=>{
    document.getElementById(t).style.display="none";
  });
  document.getElementById(tab).style.display="block";
}

</script>

</body>
</html>
